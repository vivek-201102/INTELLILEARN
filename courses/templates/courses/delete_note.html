{% extends 'main/base.html' %}

{% block title %}Delete Note{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 520px;">
    <div class="card border-0 shadow-sm rounded-4 p-4 text-center">
        <i class="fas fa-file-alt text-danger fa-2x mb-3"></i>
        <h4 class="fw-bold mb-2">Delete this note?</h4>
        <p class="text-muted mb-4">"<strong>{{ note.title }}</strong>" will be permanently removed.</p>
        <form method="POST" class="d-flex justify-content-center gap-2">
            {% csrf_token %}
            <a href="{% url 'course_detail' course.pk %}?tab=notes" class="btn btn-outline-secondary px-4">Cancel</a>
            <button type="submit" class="btn btn-danger px-4">Delete</button>
        </form>
    </div>
</div>
{% endblock %}
