{% extends 'main/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-4 text-center">
            <img src="{{ instructor.profile_image.url }}" class="img-fluid rounded shadow mb-3" alt="{{ instructor.name }}">
            <h3>{{ instructor.name }}</h3>
            <p class="text-primary fw-bold">{{ instructor.qualification }}</p>
            <hr>
            <div class="d-grid gap-2">
                <a href="{% url 'instructor_edit' instructor.pk %}" class="btn btn-warning">Edit Profile</a>
                <a href="{% url 'instructor_delete' instructor.pk %}" class="btn btn-danger">Remove Instructor</a>
            </div>
        </div>
        <div class="col-md-8">
            <div class="ps-md-4">
                <h4 class="border-bottom pb-2">Professional Biography</h4>
                <p class="mt-3 text-secondary" style="line-height: 1.8;">{{ instructor.bio }}</p>
                
                <h4 class="border-bottom pb-2 mt-5">Quick Stats</h4>
                <table class="table table-borderless mt-2">
                    <tr>
                        <th width="30%">Experience:</th>
                        <td>{{ instructor.experience }}</td>
                    </tr>
                    <tr>
                        <th>Specialization:</th>
                        <td>{{ instructor.qualification }}</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
