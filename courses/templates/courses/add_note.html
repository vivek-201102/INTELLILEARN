{% extends 'main/base.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-lg-8">

            <!-- Header -->
            <div class="mb-4">
                <h2 class="fw-bold" style="color:#0a2647;">
                    <i class="fas fa-plus-circle text-primary me-2"></i>
                    Add Course Note
                </h2>

                <p class="text-muted">
                    Upload notes and study materials for students.
                </p>
            </div>

            <!-- Form Card -->
            <div class="card border-0 shadow-lg rounded-4">

                <div class="card-body p-5">

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <!-- Note Title -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Note Title
                            </label>

                            <input type="text"
                                   name="title"
                                   class="form-control form-control-lg rounded-3"
                                   placeholder="Enter note title">
                        </div>

                        <!-- Description -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Description
                            </label>

                            <textarea name="description"
                                      rows="5"
                                      class="form-control rounded-3"
                                      placeholder="Write short description about this note"></textarea>
                        </div>

                        <!-- File Upload -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Upload File
                            </label>

                            <input type="file"
                                   name="file"
                                   class="form-control rounded-3">

                            <small class="text-muted">
                                Supported files: PDF, DOCX, PPT, Images, ZIP
                            </small>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex gap-3">

                            <button type="submit"
                                    class="btn btn-primary px-4 py-2 rounded-3">
                                <i class="fas fa-save me-2"></i>
                                Save Note
                            </button>

                            <a href="{% url 'course_detail' course.pk %}"
                               class="btn btn-light border px-4 py-2 rounded-3">
                                Cancel
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

</div>

{% endblock %}
