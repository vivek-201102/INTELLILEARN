{% extends 'main/base.html' %}
{% load static %}

{% block content %}

<style>
    body {
        background-color: #f4f7fe;
    }

    .student-sidebar {
        min-height: 100vh;
        background: #fff;
        border-radius: 20px;
    }

    .sidebar-link {
        display: flex;
        align-items: center;
        padding: 12px 15px;
        color: #6c757d;
        text-decoration: none;
        border-radius: 10px;
        transition: 0.3s;
        margin-bottom: 5px;
    }

    .sidebar-link:hover,
    .sidebar-link.active {
        background: #0d6efd;
        color: white;
    }

    .dashboard-content {
        padding: 10px;
    }
</style>

<div class="container-fluid mt-4">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-lg-3 d-none d-lg-block">

            <div class="student-sidebar shadow-sm p-3">

                <div class="text-center mb-4">

                    <img src="https://ui-avatars.com/api/?name={{ request.user.username }}&background=0D6EFD&color=fff&size=80"
                         class="rounded-circle mb-2">

                    <h5 class="fw-bold mb-0">
                        {{ request.user.username }}
                    </h5>

                    <p class="text-muted small">
                        Student
                    </p>

                </div>

                <nav>

                    <a href="{% url 'dashboard' %}"
                       class="sidebar-link">

                        <i class="fas fa-columns me-3"></i>
                        Dashboard

                    </a>

                    <a href="{% url 'my_courses' %}"
                       class="sidebar-link">

                        <i class="fas fa-book me-3"></i>
                        My Courses

                    </a>

                    <a href="#"
                       class="sidebar-link">

                        <i class="fas fa-certificate me-3"></i>
                        Certificates

                    </a>

                    <a href="#"
                       class="sidebar-link">

                        <i class="fas fa-chart-line me-3"></i>
                        Performance

                    </a>

                    <hr>

                    <form action="{% url 'logout' %}" method="POST">

                        {% csrf_token %}

                        <button type="submit"
                                class="sidebar-link text-danger border-0 bg-transparent w-100">

                            <i class="fas fa-sign-out-alt me-3"></i>
                            Logout

                        </button>

                    </form>

                </nav>

            </div>

        </div>

        <!-- Main Content -->
        <div class="col-lg-9">

            <div class="dashboard-content">

                {% block student_content %}
                {% endblock %}

            </div>

        </div>

    </div>

</div>

{% endblock %}
