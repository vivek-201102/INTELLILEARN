{% extends 'main/instructor_base.html' %}

{% block title %}Settings | Instructor{% endblock %}

{% block instructor_content %}

<div class="mb-4">
    <h2 class="fw-bold mb-1">Settings</h2>
    <p class="text-muted mb-0">Manage your account email and password.</p>
</div>

<div class="row g-4">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
            <h5 class="fw-bold mb-3"><i class="fas fa-envelope text-primary me-2"></i>Account</h5>
            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="action" value="account">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" class="form-control" value="{{ user.username }}" disabled>
                    <div class="form-text">Username cannot be changed.</div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                </div>

                <button type="submit" class="btn btn-primary px-4">Save account</button>
            </form>
        </div>
    </div>

    <div class="col-lg-6">
        <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
            <h5 class="fw-bold mb-3"><i class="fas fa-lock text-primary me-2"></i>Change password</h5>
            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="action" value="password">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Current password</label>
                    <input type="password" name="current_password" class="form-control" required autocomplete="current-password">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">New password</label>
                    <input type="password" name="new_password" class="form-control" required minlength="8" autocomplete="new-password">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm new password</label>
                    <input type="password" name="confirm_password" class="form-control" required minlength="8" autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-outline-primary px-4">Update password</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
