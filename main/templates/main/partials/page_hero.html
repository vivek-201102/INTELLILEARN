<section class="page-hero il-animate">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-{% if hero_action %}8{% else %}12{% endif %}">
                {% if hero_badge %}
                <span class="badge badge-il-soft mb-3 px-3 py-2 rounded-pill">{{ hero_badge }}</span>
                {% endif %}
                <h1 class="page-hero-title mb-2">{{ hero_title }}</h1>
                {% if hero_subtitle %}
                <p class="lead text-muted mb-0">{{ hero_subtitle }}</p>
                {% endif %}
            </div>
            {% if hero_action %}
            <div class="col-lg-4 text-lg-end mt-3 mt-lg-0">
                {{ hero_action }}
            </div>
            {% endif %}
        </div>
    </div>
</section>
