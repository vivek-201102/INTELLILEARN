<nav>

       class="sidebar-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
        <i class="fas fa-columns me-3"></i> Dashboard
    </a>
    <a href="{% url 'my_courses' %}"
       class="sidebar-link {% if request.resolver_match.url_name == 'my_courses' %}active{% endif %}">
        <i class="fas fa-book me-3"></i> My Courses
    </a>
    <a href="{% url 'course_list' %}"
       class="sidebar-link {% if request.resolver_match.url_name == 'course_list' %}active{% endif %}">
