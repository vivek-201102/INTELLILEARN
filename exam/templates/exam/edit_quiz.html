{% extends 'main/base.html' %}

{% block title %}Edit Quiz{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 600px;">
    <div class="card border-0 shadow-sm rounded-4 p-4">
        <h3 class="fw-bold mb-4">Edit Quiz Title</h3>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="title" class="form-control mb-4" value="{{ quiz.title }}" required>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{% url 'view_quiz' quiz.pk %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
