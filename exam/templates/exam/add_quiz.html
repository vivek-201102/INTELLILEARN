{% extends 'main/base.html' %}

{% block content %}

<div class="container py-5">

    <div class="card p-4 shadow">

        <h3>Create Quiz</h3>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="title"
                   class="form-control mb-3"
                   placeholder="Quiz Title"
                   required>

            <button type="submit"
                    class="btn btn-primary">

                Create Quiz

            </button>

        </form>

    </div>

</div>

{% endblock %}
