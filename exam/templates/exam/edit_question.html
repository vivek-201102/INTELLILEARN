{% extends 'main/base.html' %}

{% block title %}Edit Question{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 720px;">
    <div class="card border-0 shadow-sm rounded-4 p-4">
        <h3 class="fw-bold mb-4">Edit Question</h3>
        <form method="POST">
            {% csrf_token %}
            <textarea name="question" class="form-control mb-3" rows="3" required>{{ question.question }}</textarea>
            <input type="text" name="option1" id="option1" class="form-control mb-2" value="{{ question.option1 }}" required>
            <input type="text" name="option2" id="option2" class="form-control mb-2" value="{{ question.option2 }}" required>
            <input type="text" name="option3" id="option3" class="form-control mb-2" value="{{ question.option3 }}" required>
            <input type="text" name="option4" id="option4" class="form-control mb-3" value="{{ question.option4 }}" required>
            <select name="correct_answer" id="correct_answer" class="form-select mb-4" required>
                <option value="{{ question.option1 }}" {% if question.correct_answer == question.option1 %}selected{% endif %}>Option 1</option>
                <option value="{{ question.option2 }}" {% if question.correct_answer == question.option2 %}selected{% endif %}>Option 2</option>
                <option value="{{ question.option3 }}" {% if question.correct_answer == question.option3 %}selected{% endif %}>Option 3</option>
                <option value="{{ question.option4 }}" {% if question.correct_answer == question.option4 %}selected{% endif %}>Option 4</option>
            </select>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save changes</button>
                <a href="{% url 'view_quiz' question.quiz.pk %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
