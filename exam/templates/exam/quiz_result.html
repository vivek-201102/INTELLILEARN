{% extends 'main/student_base.html' %}

{% block student_content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <!-- Card Wrapper for a clean, professional UI -->
            <div class="card shadow border-0 rounded-4 overflow-hidden">

                <!-- Top Decorative Accent -->
                <div class="bg-primary" style="height: 6px;"></div>

                <div class="card-body p-5 text-center">

                    <!-- Professional SVG Graphic (Success/Celebration) -->
                    <div class="mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none"
                            stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                            class="feather feather-award text-primary animate-bounce">
                            <circle cx="12" cy="8" r="7"></circle>
                            <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline>
                        </svg>
                    </div>

                    <!-- Heading -->
                    <h2 class="fw-bold text-dark mb-2">Quiz Completed!</h2>
                    <p class="text-muted mb-4">Great job on finishing your assessment. Here is a summary of your
                        performance.</p>

                    <!-- Score Display Box -->
                    <div class="bg-light rounded-3 p-4 mb-4 border">
                        <span class="text-uppercase text-muted small fw-semibold tracking-wider d-block mb-1">Your
                            Score</span>
                        <h3 class="display-5 fw-bold text-primary mb-0">
                            {{ score }} <span class="text-muted fs-4">/ {{ total }}</span>
                        </h3>
                    </div>

                    <!-- Action Buttons -->
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mt-4">
                        <a href="{% url 'quiz_review' attempt_id=attempt.id %}"
                            class="btn btn-primary btn-lg px-4 gap-3 rounded-pill shadow-sm">Review Answers</a>

                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-lg px-4 rounded-pill">Back
                            to Dashboard</a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Optional: Simple CSS animation to make the badge feel alive -->
<style>
    @keyframes float {
        0% {
            transform: translateY(0px);
        }

        50% {
            transform: translateY(-10px);
        }

        100% {
            transform: translateY(0px);
        }
    }

    .animate-bounce {
        animation: float 3s ease-in-out infinite;
    }
</style>
{% endblock %}
